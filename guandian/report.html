<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var path = location.pathname.replace(/\\/g, '/');
      var marker = '/guandian';
      var idx = path.indexOf(marker);
      if (idx !== -1) path = path.slice(0, idx + marker.length) + '/';
      else if (/\.html$/i.test(path)) path = path.slice(0, path.lastIndexOf('/') + 1);
      else if (!path.endsWith('/')) path += '/';
      document.write('<base href="' + path + '">');
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公司财务分析报告</title>

  <script src="js/report-ui.js"></script>
</head>
