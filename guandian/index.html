<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公司财务分析 · 卿晓萌</title>
  <script src="js/base.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="container">
  <div class="portal-hero">
    <h1>📊 公司财务分析</h1>
    <p>点击公司卡片直接进入完整 8 章分析报告 · 勾选多家后可生成横向对比</p>
  </div>

  <div class="select-all">
    <button class="btn btn-secondary" id="selectAll">全选对比</button>
    <button class="btn btn-secondary" id="clearAll">清除勾选</button>
    <span class="hint" style="margin-left:12px" id="selCount">已选 0 家（用于对比）</span>
  </div>

  <div class="company-grid" id="companyGrid">
    <p class="hint" style="grid-column:1/-1;text-align:center;padding:24px">正在加载公司列表…</p>
  </div>

  <div class="action-bar">
    <button class="btn btn-primary" id="openCompare" disabled>多公司对比表（需勾选 2 家及以上）</button>
  </div>

  <div class="section" style="margin-top:24px">
    <h2 style="border:none;padding:0;margin-bottom:10px;font-size:15px">📋 涵盖 8 家公司</h2>
    <p class="hint">小米集团 · 阿里巴巴 · 腾讯控股 · 蚂蚁集团 · Apple · Nvidia · AMD · 立讯精密 — 各公司财年截止日不同，报告中均单独标注。</p>
  </div>

  <p class="disclaimer">数据来源：各公司 IR / 港交所 / SEC / 巨潮资讯 · 仅供研究参考，不构成投资建议 · 报告日期 2026-06-22</p>
</div>
<script src="../_lib/oneway.js"></script>
<script src="js/portal.js"></script>
</body>
</html>
