<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var path = location.pathname.replace(/\\/g, '/');
      var marker = '/guandian';
      var idx = path.indexOf(marker);
      if (idx !== -1) path = path.slice(0, idx + marker.length) + '/';
      else if (/\.html$/i.test(path)) path = path.slice(0, path.lastIndexOf('/') + 1);
      else if (!path.endsWith('/')) path += '/';
      document.write('<base href="' + path + '">');
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公司财务分析 · 卿晓萌</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="container">
  <div class="portal-hero">
    <h1>公司财务深度研究</h1>
    <p>7 家公司 · 点击卡片进入完整分析报告 · 含十席博弈与 1～2 年股价/市值情景</p>
  </div>
  <div class="company-grid" id="companyGrid">
    <p class="hint" style="grid-column:1/-1;text-align:center;padding:24px">正在加载…</p>
  </div>
  <div class="section section--compact" style="margin-top:16px">
    <p class="hint">数据来源：各公司 IR / 港交所 / SEC / 巨潮资讯 · 研究情景推演不构成投资建议 · 2026-06-23</p>
    <p class="hint">已移除蚂蚁集团；其余公司与线上一致并升级交互版报告。</p>
  </div>
</div>
<script src="js/data-portal.js"></script>
<script src="js/portal.js"></script>
</body>
</html>
