<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var path = location.pathname.replace(/\\/g, '/');
      var marker = '/guandian';
      var idx = path.indexOf(marker);
      if (idx !== -1) path = path.slice(0, idx + marker.length) + '/';
      else if (/\.html$/i.test(path)) path = path.slice(0, path.lastIndexOf('/') + 1);
      else if (!path.endsWith('/')) path += '/';
      document.write('<base href="' + path + '">');
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公司财务分析 · 卿晓萌</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="container portal-shell">
  <div class="portal-hero">
    <p class="portal-hero__tag">GUANDIAN RESEARCH · v4</p>
    <h1>公司财务深度研究</h1>
    <p>7 家公司 · 财报真实性核查 · 五千字优化计划 · 十席博弈 · 2026-06 情景预测</p>
  </div>

  <div class="portal-flow" aria-label="阅读流程">
    <div class="portal-flow__item">
      <span class="portal-flow__num">1</span>
      <div><strong>选择公司</strong><p>点击卡片进入完整报告，已移除蚂蚁集团。</p></div>
    </div>
    <div class="portal-flow__item">
      <span class="portal-flow__num">2</span>
      <div><strong>财报核查</strong><p>对比管理层叙事与剔除干扰项后的核心指标。</p></div>
    </div>
    <div class="portal-flow__item">
      <span class="portal-flow__num">3</span>
      <div><strong>博弈与预测</strong><p>十席分析师质询 + 2026-06 起两年情景折线。</p></div>
    </div>
  </div>

  <div class="company-grid" id="companyGrid">
    <p class="hint" style="grid-column:1/-1;text-align:center;padding:24px">正在加载…</p>
  </div>

  <div class="section section--compact" style="margin-top:16px">
    <p class="hint">数据来源：各公司 IR / 港交所 / SEC / 巨潮资讯 · 研究情景推演不构成投资建议</p>
    <p class="hint">报告版式 v4 · 数据截至 2026-06-23 · 小米为深度模板，其余公司逐家升级中</p>
  </div>
</div>
<script src="js/data-bundle.js"></script>
<script src="js/portal.js"></script>
</body>
</html>
