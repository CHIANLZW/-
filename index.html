<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>inchian.top — 站点入口</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --card: #141414;
      --text: #f2f2f2;
      --muted: #9a9a9a;
      --accent: #e85d04;
      --border: rgba(255, 255, 255, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
    }
    .portal { width: min(100%, 720px); text-align: center; }
    .portal__label {
      font-size: 0.75rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .portal__title { font-size: clamp(1.75rem, 5vw, 2.25rem); margin-bottom: 0.5rem; }
    .portal__desc { color: var(--muted); margin-bottom: 2.5rem; line-height: 1.7; }
    .portal__grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      text-align: left;
    }
    .portal__card {
      display: block;
      padding: 1.75rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      color: inherit;
      text-decoration: none;
      transition: border-color 0.25s, transform 0.25s;
    }
    .portal__card:hover {
      border-color: rgba(232, 93, 4, 0.45);
      transform: translateY(-2px);
    }
    .portal__card strong { display: block; font-size: 1.125rem; margin-bottom: 0.5rem; }
    .portal__card span { font-size: 0.875rem; color: var(--muted); line-height: 1.6; }
    .portal__copy { margin-top: 2rem; font-size: 0.75rem; color: var(--muted); }
  </style>
</head>
<body>
  <main class="portal">
    <p class="portal__label">inchian.top</p>
    <h1 class="portal__title">选择站点版本</h1>
    <p class="portal__desc">工作室官网与个人简历为两套独立站点，内容同源、展示独立。</p>
    <div class="portal__grid">
      <a href="studio/index.html" class="portal__card">
        <strong>重庆苍凌工作室</strong>
        <span>企业官网 · 低空产业服务 · 案例库 · 合作单位 · 创新延伸作品集</span>
      </a>
      <a href="resume/index.html" class="portal__card">
        <strong>个人简历</strong>
        <span>个人品牌版 · 项目经历 · 技能栈 · 联系方式（待完善信息已留空）</span>
      </a>
    </div>
    <p class="portal__copy">&copy; 2026 inchian.top</p>
  </main>
</body>
</html>
